				step: 0.1,
				unit: "deg",
				defaultValue: 0,
			},
			{
				prop: "x",
				label: "X",
				min: -400,
				max: 400,
				step: 1,
				unit: "px",
				defaultValue: 0,
			},
			{
				prop: "y",
				label: "Y",
				min: -400,
				max: 400,
				step: 1,
				unit: "px",
				defaultValue: 0,
			},
			{
				prop: "scale-x",
				label: "Scale X",
				min: 0.2,
				max: 3,
				step: 0.01,
				unit: "",
				defaultValue: 1,
				isScale: true,
			},
			{
				prop: "scale-y",
				label: "Scale Y",
				min: 0.2,
				max: 3,
				step: 0.01,
				unit: "",
				defaultValue: 1,
				isScale: true,
			},
		];

		const sliderDefMap = new Map(sliderDefs.map((def) => [def.prop, def]));
		const inputsByVar = new Map();

		let shiftDown = false;
		let ctrlDown = false;

		function resetInput(input) {
			const def = sliderDefMap.get(input.dataset.prop);

			setSliderValue(input, def.defaultValue);
			input.dataset.lastValue = input.value;
		}

		function resetGroup(groupKey) {
			for (const def of sliderDefs) {
				const varName = cssVarName(groupKey, def.prop);
				const input = inputsByVar.get(varName);

				if (input) {
					resetInput(input);
				}
			}
		}

		function cssVarName(groupKey, prop) {
			return `--${groupKey}-${prop}`;
		}

		function getDecimals(step) {
			const stepString = String(step);

			if (!stepString.includes(".")) {
				return 0;
			}

			return stepString.split(".")[1].length;
		}

		function formatOutputValue(def, rawValue) {
			const num = Number(rawValue);
			const text = num
				.toFixed(getDecimals(def.step))
				.replace(/\.0+$/, "");

			return def.unit ? `${text}${def.unit}` : text;
		}

		function formatCssValue(def, rawValue) {
			const num = Number(rawValue);
			return def.unit ? `${num}${def.unit}` : String(num);
		}

		function clamp(value, min, max) {
			return Math.min(max, Math.max(min, value));
		}

		function updateSliderVisual(input) {
			const def = sliderDefMap.get(input.dataset.prop);
			const output = input.parentElement.querySelector("output");

			root.style.setProperty(input.dataset.var, formatCssValue(def, input.value));
			output.value = formatOutputValue(def, input.value);
			output.textContent = formatOutputValue(def, input.value);
		}

		function setSliderValue(input, value) {
			const clamped = clamp(value, Number(input.min), Number(input.max));
			input.value = String(clamped);
			updateSliderVisual(input);
		}

		function getPairedScaleInput(input) {
			const def = sliderDefMap.get(input.dataset.prop);

			if (!def.isScale) {
				return null;
			}

			const otherProp =
				input.dataset.prop === "scale-x" ? "scale-y" : "scale-x";
			const otherVar = cssVarName(input.dataset.group, otherProp);

			return inputsByVar.get(otherVar) ?? null;
		}

		function handleSliderInput(input) {
			const def = sliderDefMap.get(input.dataset.prop);

			if (!def.isScale) {
				updateSliderVisual(input);
				input.dataset.lastValue = input.value;
				return;
			}

			const previousValue = Number(input.dataset.lastValue ?? input.value);
			const currentValue = Number(input.value);
			const delta = currentValue - previousValue;
			const otherInput = getPairedScaleInput(input);

			updateSliderVisual(input);

			if (otherInput) {
				if (ctrlDown) {
					setSliderValue(otherInput, currentValue);
				} else if (!shiftDown) {
					const otherCurrentValue = Number(otherInput.value);
					setSliderValue(otherInput, otherCurrentValue + delta);
				}
			}

			input.dataset.lastValue = input.value;

			if (otherInput) {
				otherInput.dataset.lastValue = otherInput.value;
			}
		}

		function buildSliders() {
			for (const group of groups) {
				const card = document.createElement("section");
				card.className = "slider-group";

				const head = document.createElement("div");
				head.className = "slider-group-head";

				const title = document.createElement("h3");
				title.textContent = group.label;

				const blockReset = document.createElement("button");
				blockReset.type = "button";
				blockReset.className = "block-reset";
				blockReset.textContent = "Reset block";
				blockReset.addEventListener("click", () => {
					resetGroup(group.key);
				});

				head.append(title, blockReset);
				card.appendChild(head);

				for (const def of sliderDefs) {
					const varName = cssVarName(group.key, def.prop);
					const inputId = `${group.key}-${def.prop}`;

					const row = document.createElement("div");
					row.className = "control";

					const label = document.createElement("label");
					label.className = "control-label";
					label.htmlFor = inputId;
					label.textContent = def.label;

					const input = document.createElement("input");
					input.type = "range";
					input.id = inputId;
					input.min = String(def.min);
					input.max = String(def.max);
					input.step = String(def.step);
					input.value = String(def.defaultValue);
					input.dataset.var = varName;
					input.dataset.group = group.key;
					input.dataset.prop = def.prop;
					input.dataset.lastValue = String(def.defaultValue);

					const output = document.createElement("output");
					output.textContent = formatOutputValue(def, def.defaultValue);
					output.value = formatOutputValue(def, def.defaultValue);

					const controlReset = document.createElement("button");
					controlReset.type = "button";
					controlReset.className = "control-reset";
					controlReset.textContent = "🔄";
					controlReset.title = `Reset ${group.label}: ${def.label}`;
					controlReset.setAttribute(
						"aria-label",
						`Reset ${group.label}: ${def.label}`,
					);
					controlReset.addEventListener("click", () => {
						resetInput(input);
					});

					input.addEventListener("input", () => {
						handleSliderInput(input);
					});

					row.append(label, input, output, controlReset);
					card.appendChild(row);

					inputsByVar.set(varName, input);
				}

				sliderGroupsHost.appendChild(card);
			}
		}

		function applyCheckboxes() {
			svg.classList.toggle(
				"no-upper-brow",
				document.getElementById("hide-upper-brow").checked,
			);

			svg.classList.toggle(
				"no-lower-brow",
				document.getElementById("hide-lower-brow").checked,
			);

			svg.classList.toggle(
				"no-cheek",
				document.getElementById("hide-cheek").checked,
			);
		}

		function applyEyeStyle() {
			const value = document.querySelector(
				'input[name="eye-style"]:checked',
			).value;

			svg.classList.toggle("batpony-eyes", value === "batpony");
		}

		function applyExpression() {
			const value = document.querySelector(
				'input[name="expression"]:checked',
			).value;

			svg.classList.remove("smile", "frown");

			if (value === "smile") {
				svg.classList.add("smile");
			} else if (value === "frown") {
				svg.classList.add("frown");
			}
		}

		function applyShadowMode() {
			const value = document.querySelector(
				'input[name="shadow-mode"]:checked',
			).value;

			svg.classList.remove("simple-shadow", "no-shadow");

			if (value === "simple") {
				svg.classList.add("simple-shadow");
			} else if (value === "none") {
				svg.classList.add("no-shadow");
			}
		}

		function resetAll() {
			for (const group of groups) {
				for (const def of sliderDefs) {
					const varName = cssVarName(group.key, def.prop);
					const input = inputsByVar.get(varName);

					resetInput(input);
				}
			}

			document.getElementById("hide-upper-brow").checked = false;
			document.getElementById("hide-lower-brow").checked = false;
			document.getElementById("hide-cheek").checked = true;

			document.querySelector(
				'input[name="eye-style"][value="normal"]',
			).checked = true;

			document.querySelector(
				'input[name="expression"][value="slight"]',
			).checked = true;

			document.querySelector(
				'input[name="shadow-mode"][value="full"]',
			).checked = true;

			applyCheckboxes();
			applyEyeStyle();
			applyExpression();
			applyShadowMode();
		}

		function roundForSvg(value) {
			return Number(value.toFixed(6));
		}

		function parseTransformOrigin(value) {
			const [x = "0", y = "0"] = value.trim().split(/\s+/);

			return [parseFloat(x) || 0, parseFloat(y) || 0];
		}

		function parseCssMatrix(value) {
			if (!value || value === "none") {
				return null;
			}

			const matrixMatch = value.match(/^matrix\((.+)\)$/);

			if (matrixMatch) {
				return matrixMatch[1].split(",").map((part) => Number(part.trim()));
			}

			const matrix3dMatch = value.match(/^matrix3d\((.+)\)$/);

			if (matrix3dMatch) {
				const values = matrix3dMatch[1]
					.split(",")
					.map((part) => Number(part.trim()));

				return [
					values[0],
					values[1],
					values[4],
					values[5],
					values[12],
					values[13],
				];
			}

			return null;
		}

		function normalizeUrlReference(value) {
			return value.replace(/url\((['"]?)(.*?)\1\)/g, (_, quote, urlValue) => {
				const hashIndex = urlValue.indexOf("#");

				if (hashIndex === -1) {
					return `url(${quote}${urlValue}${quote})`;
				}

				return `url(#${urlValue.slice(hashIndex + 1)})`;
			});
		}

		function makeBakedTransform(matrix, originX, originY) {
			const [a, b, c, d, e, f] = matrix.map(roundForSvg);
			const ox = roundForSvg(originX);
			const oy = roundForSvg(originY);

			return [
				`translate(${ox} ${oy})`,
				`matrix(${a} ${b} ${c} ${d} ${e} ${f})`,
				`translate(${-ox} ${-oy})`,
			].join(" ");
		}

		function bakeNode(originalNode, clonedNode) {
			const style = getComputedStyle(originalNode);

			clonedNode.setAttribute("display", style.display);

			if (style.visibility && style.visibility !== "visible") {
				clonedNode.setAttribute("visibility", style.visibility);
			} else {
				clonedNode.removeAttribute("visibility");
			}

			const originalClipPath = originalNode.getAttribute("clip-path");

			if (style.clipPath && style.clipPath !== "none") {
				clonedNode.setAttribute(
					"clip-path",
					normalizeUrlReference(style.clipPath),
				);
			} else if (originalClipPath) {
				clonedNode.setAttribute("clip-path", "none");
			}

			if (style.opacity && style.opacity !== "1") {
				clonedNode.setAttribute("opacity", style.opacity);
			} else {
				clonedNode.removeAttribute("opacity");
			}

			if (clonedNode.id === "Shadow") {
				clonedNode.setAttribute("fill", normalizeUrlReference(style.fill));
			}

			const matrix = parseCssMatrix(style.transform);

			if (!matrix) {
				return;
			}

			const [originX, originY] = parseTransformOrigin(style.transformOrigin);
			const bakedTransform = makeBakedTransform(matrix, originX, originY);
			const existingTransform = clonedNode.getAttribute("transform");

			clonedNode.setAttribute(
				"transform",
				existingTransform
					? `${existingTransform} ${bakedTransform}`
					: bakedTransform,
			);
		}

		function downloadTextFile(filename, text, type) {
			const blob = new Blob([text], { type });
			const url = URL.createObjectURL(blob);
			const link = document.createElement("a");

			link.href = url;
			link.download = filename;
			document.body.appendChild(link);
			link.click();
			link.remove();

			URL.revokeObjectURL(url);
		}

		function exportSvg() {
			const clone = svg.cloneNode(true);

			clone.setAttribute("xmlns", "http://www.w3.org/2000/svg");
			clone.setAttribute("xmlns:xlink", "http://www.w3.org/1999/xlink");
			clone.removeAttribute("class");

			const originalNodes = [svg, ...svg.querySelectorAll("*")];
			const clonedNodes = [clone, ...clone.querySelectorAll("*")];

			originalNodes.forEach((originalNode, index) => {
				bakeNode(originalNode, clonedNodes[index]);
			});

			const serialized = new XMLSerializer().serializeToString(clone);
			const svgText = [
				'<?xml version="1.0" encoding="UTF-8"?>',
				serialized,
			].join("\n");

			downloadTextFile("pony-eyes.svg", svgText, "image/svg+xml");
		}

		window.addEventListener("keydown", (event) => {
			if (event.key === "Shift") {
				shiftDown = true;
			}

			if (event.key === "Control") {
				ctrlDown = true;
			}
		});

		window.addEventListener("keyup", (event) => {
			if (event.key === "Shift") {
				shiftDown = false;
			}

			if (event.key === "Control") {
				ctrlDown = false;
			}
		});

		window.addEventListener("blur", () => {
			shiftDown = false;
			ctrlDown = false;
		});

		document
			.getElementById("hide-upper-brow")
			.addEventListener("change", applyCheckboxes);

		document
			.getElementById("hide-lower-brow")
			.addEventListener("change", applyCheckboxes);

		document
			.getElementById("hide-cheek")
			.addEventListener("change", applyCheckboxes);

		for (const radio of document.querySelectorAll('input[name="eye-style"]')) {
			radio.addEventListener("change", applyEyeStyle);
		}

		for (const radio of document.querySelectorAll('input[name="expression"]')) {
			radio.addEventListener("change", applyExpression);
		}

		for (const radio of document.querySelectorAll('input[name="shadow-mode"]')) {
			radio.addEventListener("change", applyShadowMode);
		}

		resetButton.addEventListener("click", resetAll);
		exportButton.addEventListener("click", exportSvg);

		buildSliders();
		resetAll();
	</script>

	
</body>
